server:
  port: 8085

spring:
  application:
    name: notification-service
  config:
    import: "${SPRING_CONFIG_IMPORT:optional:configserver:http://localhost:8888/}"
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
    connection-timeout: 10000
    listener:
      simple:
        acknowledge-mode: auto
        prefetch: 1
        retry:
          enabled: true
          initial-interval: 1000
          max-interval: 10000
          max-attempts: 3
          multiplier: 2.0

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
kafka:
  bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  consumer:
    group-id: notification-service-audit
    key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    # earliest: consumer ilk başladığında topic'in en başından oku.
    # production'da çoğunlukla "latest" kullanırsın, ama ilk öğrenirken
    # earliest kullan ki test mesajlarını da görebilesin.
    auto-offset-reset: earliest
    # Manuel commit kontrolü için
    enable-auto-commit: false
  listener:
    ack-mode: manual