server:
  port: 8081

spring:
  application:
    name: account-service
  config:
    import: "${SPRING_CONFIG_IMPORT:optional:configserver:http://localhost:8888/}"

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  packages-to-scan: org.murat.accountservice
  show-actuator: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      # acks=all: tüm in-sync replica'lar onay verene kadar bekler. Finansal veride şart.
      acks: all
      # Idempotent producer: aynı mesajın tekrar tekrar yazılmasını engeller (retry durumunda).
      properties:
        enable.idempotence: true
        # Sıralamanın bozulmaması için max in-flight 5 ile sınırlı (idempotence ile uyumlu)
        max.in.flight.requests.per.connection: 5
      retries: 3